// ── API via JSONP (works from browser iframes) ──────────────────────────────────
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Math.random().toString(36).slice(2);
    const qs = Object.entries({...params, callback: cb}).map(([k,v]) => k + "=" + encodeURIComponent(v)).join("&");
    const script = document.createElement("script");
    script.src = SCRIPT + "?" + qs;
    window[cb] = (data) => { resolve(data); delete window[cb]; document.body.removeChild(script); };
    script.onerror = () => reject(new Error("JSONP error"));
    document.body.appendChild(script);
    setTimeout(() => reject(new Error("Timeout")), 15000);
  });
}
async function apiGet(action) {
  return jsonp({ action });
}
async function apiPost(body) {
  // Send all fields as GET params via JSONP
  return jsonp(body);
}

  async function deleteOrder(clientId,orderId) {
    const c=clients.find(x=>x.id===clientId);
    const ord=c&&(c.history||[]).find(h=>h.id===orderId);
    if(!ord)return;
    setSaving(true);
    const upd={...c,points:Math.max(0,Number(c.points)-ord.points),orders:Math.max(0,Number(c.orders)-1),history:(c.history||[]).filter(h=>h.id!==orderId)};
    try {

    if(idx>=0) MENU_CATS[idx].items.push(ni);
    else MENU_CATS.unshift({cat:"Especiales del Dia",emoji:"🌟",items:[ni]});
    setSpecName("");setSpecPrice("");setShowSpec(false);
    notify("Especialidad agregada");
  }

  return (
    <div>
      {saving&&<div style={{position:"fixed",top:0,left:0,right:0,background:B,color:"#000",textAlign:"center",padding:"6px",fontSize:13,fontWeight:700,zIndex:999}}>Guardando en Google Sheets...</div>}

      <div style={g.statg}>
        {[{l:"Clientes",v:clients.length,a:B},{l:"Ventas hoy",v:fmt(todayRev),a:"#22c55e"},{l:"Total ventas",v:fmt(totalRev),a:"#2EC4B6"},{l:"Pedidos",v:sales.length,a:"#9B5DE5"}].map(s=>(
          <div key={s.l} style={g.stat(s.a)}>
            <div style={g.sbar(s.a)} />
            <div style={{fontSize:24,fontWeight:900,color:s.a,marginBottom:2}}>{s.v}</div>
            <div style={{fontSize:12,color:"#777"}}>{s.l}</div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
        {[["pedidos","Pedidos"],["clientes","Clientes"],["stats","Stats"]].map(([k,l])=>(
          <button key={k} style={g.tab(tab===k)} onClick={()=>setTab(k)}>{l}</button>
        ))}
        <button style={{...g.btn("g"),...g.sm,marginLeft:"auto"}} onClick={()=>setShowSpec(true)}>+ Especialidad del dia</button>
      </div>

      {tab==="pedidos"&&(
        <div style={g.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{...g.h2,margin:0}}>Registrar pedido</p>
            <button style={{...g.btn("y"),...g.sm}} onClick={()=>setShowNew(true)}>+ Nuevo cliente</button>
          </div>
          <input style={{...g.input,marginBottom:12}} placeholder="Buscar cliente..." value={q} onChange={e=>setQ(e.target.value)} />
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {fil.slice(0,8).map(c=>{
              const lv=levelOf(Number(c.points));
              return(
                <div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#111",borderRadius:10,padding:"10px 14px",border:"1px solid #1e1e1e"}}>
                  <div>
                    <span style={{fontWeight:700}}>{c.name}</span>
                    <span style={{color:"#666",fontSize:12,marginLeft:8}}>{c.phone}</span>
                    <span style={{...g.badge(lv.color),marginLeft:8}}>{lv.label}</span>
                    {c.address&&<div style={{fontSize:11,color:"#555"}}>📍 {c.address}</div>}
                  </div>
                  <div style={g.flex}>
                    <span style={{color:B,fontWeight:800,fontSize:14}}>{c.points} pts</span>
                    <button style={{...g.btn("y"),...g.sm}} onClick={()=>setOrderFor(c)}>+ Pedido</button>
                  </div>
                </div>
              );
            })}
            {fil.length===0&&<p style={{color:"#555",fontSize:13,textAlign:"center"}}>No encontrado — <span style={{color:B,cursor:"pointer",fontWeight:700}} onClick={()=>setShowNew(true)}>registrar nuevo cliente</span></p>}
          </div>
        </div>
      )}

      {tab==="clientes"&&(
        <div style={g.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{...g.h2,margin:0}}>Clientes ({clients.length})</p>
            <div style={g.flex}>
              <input style={{...g.input,width:200}} placeholder="Buscar..." value={q} onChange={e=>setQ(e.target.value)} />
              <button style={{...g.btn("y"),...g.sm}} onClick={()=>setShowNew(true)}>+ Nuevo</button>
            </div>
          </div>
          <table style={g.tbl}>
            <thead><tr>{["Cliente","Telefono","Dir","Pedidos","Puntos","Nivel",""].map(h=><th key={h} style={g.th}>{h}</th>)}</tr></thead>
            <tbody>
              {fil.map(c=>{const lv=levelOf(Number(c.points));return(
                <tr key={c.id}>
                  <td style={g.td}><div style={{fontWeight:700}}>{c.name}</div><div style={{fontSize:11,color:"#555"}}>{c.joined}</div></td>
                  <td style={{...g.td,color:"#888"}}>{c.phone}</td>
                  <td style={{...g.td,color:"#777",fontSize:12}}>{c.address||"—"}</td>
                  <td style={g.td}>{c.orders}</td>
                  <td style={g.td}><span style={{color:B,fontWeight:800}}>{c.points}</span></td>
                  <td style={g.td}><span style={g.badge(lv.color)}>{lv.label}</span></td>
                  <td style={g.td}>
                    <div style={g.flex}>
                      <button style={{...g.btn(),...g.sm}} onClick={()=>setEditClient({...c})}>Editar</button>
                      <button style={{...g.btn("r"),...g.sm}} onClick={()=>{if(window.confirm("Eliminar a "+c.name+"?"))deleteClient(c.id);}}>Eliminar</button>
                    </div>
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
          {fil.slice(0,5).map(c=>(c.history||[]).length>0&&(
            <div key={"h"+c.id} style={{marginTop:14,borderTop:"1px solid #222",paddingTop:12}}>
              <p style={{fontWeight:700,fontSize:13,marginBottom:8,color:B}}>{c.name} — historial</p>
              <table style={g.tbl}>
                <thead><tr>{["Fecha","Productos","Total","Pts",""].map(h=><th key={h} style={g.th}>{h}</th>)}</tr></thead>
                <tbody>{(c.history||[]).map(h=>(
                  <tr key={h.id}>
                    <td style={{...g.td,color:"#777",fontSize:12}}>{h.date}</td>
                    <td style={{...g.td,color:"#888",fontSize:12}}>{Array.isArray(h.items)?h.items.join(", "):h.items}</td>
                    <td style={{...g.td,color:B,fontWeight:700}}>{fmt(h.total)}</td>
                    <td style={{...g.td,color:"#22c55e",fontWeight:700}}>+{h.points}</td>
                    <td style={g.td}><button style={{...g.btn("r"),...g.sm}} onClick={()=>{if(window.confirm("Eliminar pedido?"))deleteOrder(c.id,h.id);}}>Eliminar</button></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          ))}
        </div>
      )}

      {tab==="stats"&&(
        <div>
          <div style={g.card}>
            <p style={g.h2}>Productos mas vendidos</p>
            {top.length===0?<p style={{color:"#555",fontSize:13}}>Sin ventas aun.</p>:top.map(([name,qty],i)=>(
              <div key={name} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span><span style={{color:B,fontWeight:800}}>#{i+1}</span> {name}</span><span style={{color:B,fontWeight:700}}>{qty}x</span></div>
                <div style={{background:"#222",borderRadius:999,height:5}}><div style={{background:B,height:"100%",width:((qty/top[0][1])*100)+"%",borderRadius:999}} /></div>
              </div>
            ))}
          </div>
          <div style={g.card}>
            <p style={g.h2}>Ultimos pedidos</p>
            {sales.length===0?<p style={{color:"#555",fontSize:13}}>Sin pedidos.</p>
              :<table style={g.tbl}><thead><tr>{["Fecha","Cliente","Productos","Total","Pts"].map(h=><th key={h} style={g.th}>{h}</th>)}</tr></thead>
              <tbody>{sales.slice(0,15).map(s=>(
                <tr key={s.id}>
                  <td style={{...g.td,color:"#777",fontSize:12}}>{s.date}</td>
                  <td style={{...g.td,fontWeight:600}}>{s.clientName}</td>
                  <td style={{...g.td,color:"#888",fontSize:12}}>{Array.isArray(s.items)?s.items.join(", "):s.items}</td>
                  <td style={{...g.td,color:B,fontWeight:700}}>{fmt(s.total)}</td>
                  <td style={{...g.td,color:"#22c55e",fontWeight:700}}>+{s.points}</td>
                </tr>
              ))}</tbody></table>}
          </div>
        </div>
      )}

      {showNew&&(
        <div style={g.overlay}>
          <div style={{...g.modal,maxWidth:380}}>
            <p style={{...g.h2,color:B}}>Nuevo cliente</p>
            {[["Nombre completo","name"],["Telefono","phone"],["Direccion","address"]].map(([lb,k])=>(
              <div key={k} style={{marginBottom:10}}>
                <div style={{fontSize:12,color:"#888",marginBottom:4}}>{lb}</div>
                <input style={g.input} value={nf[k]} onChange={e=>setNf({...nf,[k]:e.target.value})} onKeyDown={e=>e.key==="Enter"&&reg()} />
              </div>
            ))}
            <div style={{...g.flex,marginTop:14}}>
              <button style={{...g.btn("y"),flex:1}} onClick={reg} disabled={saving}>Registrar y Guardar</button>
              <button style={g.btn("r")} onClick={()=>setShowNew(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {editClient&&(
        <div style={g.overlay}>
          <div style={{...g.modal,maxWidth:380}}>
            <p style={{...g.h2,color:B}}>Editar cliente</p>
            {[["Nombre","name"],["Telefono","phone"],["Direccion","address"]].map(([lb,k])=>(
              <div key={k} style={{marginBottom:10}}>
                <div style={{fontSize:12,color:"#888",marginBottom:4}}>{lb}</div>
                <input style={g.input} value={editClient[k]||""} onChange={e=>setEditClient({...editClient,[k]:e.target.value})} />
              </div>
            ))}
            <div style={{...g.flex,marginTop:14}}>
              <button style={{...g.btn("y"),flex:1}} onClick={saveEdit} disabled={saving}>Guardar</button>
              <button style={g.btn("r")} onClick={()=>setEditClient(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {showSpec&&(
        <div style={g.overlay}>
          <div style={{...g.modal,maxWidth:360}}>
            <p style={{...g.h2,color:B}}>Especialidad del dia</p>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:12,color:"#888",marginBottom:4}}>Nombre del platillo</div>
              <input style={g.input} value={specName} onChange={e=>setSpecName(e.target.value)} placeholder="Ej: Pollo al horno especial" />
            </div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:12,color:"#888",marginBottom:4}}>Precio ($)</div>
              <input style={g.input} type="number" value={specPrice} onChange={e=>setSpecPrice(e.target.value)} placeholder="3.50" />
            </div>
            <div style={{...g.flex,marginTop:14}}>
              <button style={{...g.btn("y"),flex:1}} onClick={addSpec}>Agregar</button>
              <button style={g.btn("r")} onClick={()=>setShowSpec(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {orderFor&&<OrderModal client={orderFor} onConfirm={confirmOrder} close={()=>setOrderFor(null)} />}
      {ticket&&tkClient&&<Ticket order={ticket} client={tkClient} close={()=>{setTicket(null);setTkClient(null);}} />}
    </div>
  );
}

function ClientView({clients,setClients,notify}) {
  const [ph,setPh]=useState("");
  const [cl,setCl]=useState(null);

  function look() {
    const f=clients.find(c=>String(c.phone)===ph.replace(/\s/g,""));
    if(f) setCl(f);
    else notify("Numero no encontrado.");
  }

  async function redeem(r) {
    if(Number(cl.points)<r.pts)return;
    const upd={...cl,points:Number(cl.points)-r.pts};
    try {
      await apiPost({action:"updateClient",id:upd.id,name:upd.name,phone:upd.phone,address:upd.address,points:upd.points,orders:upd.orders,joined:upd.joined});
      setClients(clients.map(c=>c.id===cl.id?upd:c));
      setCl(upd);
      notify("Canjeaste: "+r.label+" ✓");
    } catch(e){ notify("Error canjeando."); }
  }

  const nr   = REWARDS.find(r=>cl&&r.pts>Number(cl.points));
  const prog = cl&&nr?Math.min((Number(cl.points)/nr.pts)*100,100):100;
  const ini  = cl?cl.name.split(" ").map(n=>n[0]).slice(0,2).join(""):"";

  if(!cl) return(
    <div style={{maxWidth:360,margin:"0 auto"}}>
      <div style={{...g.card,textAlign:"center",padding:"44px 24px"}}>
        <div style={{fontSize:48,marginBottom:8}}>☕</div>
        <div style={{fontSize:22,fontWeight:900,color:B,marginBottom:4}}>Galileo's Points</div>
        <div style={{color:"#666",fontSize:13,marginBottom:24}}>Ingresa tu telefono para ver tus puntos</div>
        <input style={{...g.input,textAlign:"center",fontSize:16,letterSpacing:2,marginBottom:12}} placeholder="Numero de telefono" value={ph} onChange={e=>setPh(e.target.value)} onKeyDown={e=>e.key==="Enter"&&look()} />
        <button style={{...g.btn("y"),width:"100%",padding:"12px"}} onClick={look}>Ver mis puntos</button>
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:380,margin:"0 auto"}}>
      <div style={{...g.card,textAlign:"center",marginBottom:14}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:B+"22",border:"2px solid "+B,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:B,margin:"0 auto 8px"}}>{ini}</div>
        <div style={{fontSize:17,fontWeight:800}}>{cl.name}</div>
        <div style={{color:"#666",fontSize:12,marginBottom:16}}>{cl.phone}</div>
        <div style={{width:84,height:84,borderRadius:"50%",border:"5px solid "+B,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",background:B+"11"}}>
          <div style={{fontSize:24,fontWeight:900,color:B,lineHeight:1}}>{cl.points}</div>
          <div style={{fontSize:10,color:"#888"}}>puntos</div>
        </div>
        {nr&&(<div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#777",marginBottom:4}}><span>Proximo: {nr.label}</span><span>{cl.points}/{nr.pts}</span></div>
          <div style={{background:"#222",borderRadius:999,height:5}}><div style={{background:B,height:"100%",width:prog+"%",borderRadius:999,transition:"width 0.5s"}} /></div>
        </div>)}
        <div style={{fontSize:11,color:"#555",marginTop:8}}>{cl.orders} pedidos</div>
      </div>
      <div style={g.card}>
        <p style={g.h2}>Premios</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {REWARDS.map(r=>{const can=Number(cl.points)>=r.pts;return(
            <div key={r.id} onClick={()=>can&&redeem(r)} style={{background:can?r.color+"18":"#111",border:"1px solid "+(can?r.color:"#1e1e1e"),borderRadius:10,padding:12,cursor:can?"pointer":"default",opacity:can?1:0.4}}>
              <div style={{fontWeight:700,fontSize:12,marginBottom:2}}>{r.label}</div>
              <div style={{fontSize:11,color:can?r.color:"#555",fontWeight:700}}>{r.pts} pts {can&&"✓"}</div>
            </div>
          );})}
        </div>
      </div>
      {(cl.history||[]).length>0&&(
        <div style={g.card}>
          <p style={g.h2}>Ultimas visitas</p>
          {(cl.history||[]).slice(0,4).map((h,i)=>(
            <div key={i} style={{borderBottom:"1px solid #1a1a1a",padding:"8px 0",fontSize:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{color:"#888"}}>{h.date}</span><span style={{color:B,fontWeight:700}}>{fmt(h.total)}</span></div>
              <div style={{color:"#666"}}>{Array.isArray(h.items)?h.items.join(", "):h.items}</div>
            </div>
          ))}
        </div>
      )}
      <button style={{...g.btn(),width:"100%"}} onClick={()=>setCl(null)}>Volver</button>
    </div>
  );
}

function App() {
  const [view,setView]       = useState("admin");
  const [clients,setClients] = useState([]);
  const [sales,setSales]     = useState([]);
  const [loading,setLoading] = useState(true);
  const [error,setError]     = useState(null);
  const [toast,setToast]     = useState(null);

  useEffect(()=>{
    async function load() {
      try {
        const [cr,sr] = await Promise.all([apiGet("getClients"),apiGet("getSales")]);
        if(cr.ok) setClients(cr.data||[]);
        if(sr.ok) setSales(sr.data||[]);
      } catch(e){
        setError("No se pudo conectar con Google Sheets. Verificá tu conexión.");
      }
      setLoading(false);
    }
    load();
  },[]);

  function notify(msg){setToast(msg);setTimeout(()=>setToast(null),3000);}

  if(loading) return(
    <div style={{...g.page,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48}}>☕</div>
      <div style={{color:B,fontWeight:700,fontSize:18}}>Cargando Galileo's Points...</div>
      <div style={{color:"#666",fontSize:13}}>Conectando con Google Sheets</div>
    </div>
  );

  if(error) return(
    <div style={{...g.page,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:24}}>
      <div style={{fontSize:48}}>⚠️</div>
      <div style={{color:"#ff5555",fontWeight:700,fontSize:16,textAlign:"center"}}>{error}</div>
    </div>
  );

  return(
    <>
      <style>{`
        *{box-sizing:border-box;}body{margin:0;background:#0A0A0A;font-family:system-ui,sans-serif;}
        input::placeholder{color:#555;}input:focus{border-color:${B}!important;}
        button:hover:not(:disabled){opacity:0.82;transform:translateY(-1px);}
        button:disabled{opacity:0.35;cursor:not-allowed!important;}
        ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
      `}</style>
      <div style={g.page}>
        <nav style={g.nav}>
          <div style={g.logo}>☕ Galileo's Points</div>
          <div style={{display:"flex",gap:4}}>
            <button style={g.tab(view==="admin")}  onClick={()=>setView("admin")}>Panel Admin</button>
            <button style={g.tab(view==="client")} onClick={()=>setView("client")}>Vista Cliente</button>
          </div>
        </nav>
        <main style={g.main}>
          {view==="admin"
            ?<AdminView clients={clients} setClients={setClients} sales={sales} setSales={setSales} notify={notify}/>
            :<ClientView clients={clients} setClients={setClients} notify={notify}/>}
        </main>
      </div>
      {toast&&<Toast msg={toast} hide={()=>setToast(null)}/>}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
